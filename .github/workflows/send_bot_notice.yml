name: Test Telegram Notification

on:
  workflow_dispatch:

jobs:
  test-notify:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: 📱 Test Telegram Notification (Latest Release)
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          set -euo pipefail
          echo "::group::Fetch Latest Release & Send Telegram Notification"
          
          if [ -z "$TG_BOT_TOKEN" ] || [ -z "$TG_CHAT_ID" ]; then
            echo "::error::Telegram secrets not configured! Please check TG_BOT_TOKEN and TG_CHAT_ID."
            exit 1
          fi
          
          echo "Fetching latest release from GitHub API..."
          
          LATEST_TAG=$(gh api repos/${{ github.repository }}/releases/latest --jq '.tag_name' 2>/dev/null || true)
          
          if [ -z "$LATEST_TAG" ]; then
            echo "::error::No releases found in the repository! Please run a real build and release first."
            exit 1
          fi
          
          echo "✅ Found latest Release Tag: $LATEST_TAG"
          
          MSG_TEXT="🧪 <b>[TEST] OnePlus Kernel Release!</b>%0A"
          MSG_TEXT+="━━━━━━━━━━━━━━━━━━%0A"
          MSG_TEXT+="<b>🏷️ Release Tag:</b> <code>${LATEST_TAG}</code>%0A"
          MSG_TEXT+="<b>🔐 Root Solution:</b> Auto-detected%0A"
          MSG_TEXT+="━━━━━━━━━━━━━━━━━━%0A"
          MSG_TEXT+="<b>📦 Device Builds & Downloads:</b>%0A%0A"
          
          ASSETS=$(gh api repos/${{ github.repository }}/releases/latest --jq '.assets[].name' 2>/dev/null || true)
          
          if [ -z "$ASSETS" ]; then
            MSG_TEXT+="<i>⚠️ No assets found in this release.</i>%0A%0A"
          else
            for filename in $ASSETS; do
              if [[ "$filename" == *.zip ]]; then
                rest="${filename#AK3_}"
                IFS='_' read -ra parts <<< "$rest"
                model="${parts[0]:-Unknown}"
                os_version="${parts[1]:-OS}"
                
                dl_link="https://github.com/${{ github.repository }}/releases/download/${LATEST_TAG}/${filename}"
                
                MSG_TEXT+="📱 <b>${model} (${os_version})</b>%0A"
                MSG_TEXT+="↳ <a href='${dl_link}'>📥 Download ZIP</a>%0A%0A"
              fi
            done
          fi
          
          MSG_TEXT+="━━━━━━━━━━━━━━━━━━%0A"
          MSG_TEXT+="<a href='${{ github.server_url }}/${{ github.repository }}/releases/tag/${LATEST_TAG}'>📝 View Full Release Notes</a>"
          
          echo "Sending message to Telegram..."
          
          HTTP_RESPONSE=$(curl -s -w "%{http_code}" -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            -d parse_mode="HTML" \
            -d disable_web_page_preview="true" \
            -d text="${MSG_TEXT}")
            
          if [[ "$HTTP_RESPONSE" != *200 ]]; then
            echo "::error::Telegram push failed! Server response: $HTTP_RESPONSE"
            echo "::error::Please check if Chat ID is correct and if the bot has been added to the channel as an admin!"
            exit 1
          fi
          
          echo "✅ Channel push test successful!"
          echo "::endgroup::"